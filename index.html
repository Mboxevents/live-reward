<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>$ANSEM – Airdrop & Live Price</title>

    <!-- ===== FAVICON ===== -->
    <link rel="icon" href="https://cdn.dexscreener.com/cms/images/A8aHRXC8VPrpfPIF?width=64&height=64&fit=crop&quality=95&format=auto" type="image/png" />
    <link rel="shortcut icon" href="https://cdn.dexscreener.com/cms/images/A8aHRXC8VPrpfPIF?width=64&height=64&fit=crop&quality=95&format=auto" type="image/png" />

    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@600;700;800&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050505;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            padding: 30px 20px;
            gap: 30px;
        }

        /* ===== BANNER UTAMA (16:9) ===== */
        .banner {
            position: relative;
            width: 100%;
            max-width: 1280px;
            aspect-ratio: 16 / 9;
            background: #0A0A0A;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(57, 255, 20, 0.15), 0 0 120px rgba(57, 255, 20, 0.05);
            border: 1px solid rgba(57, 255, 20, 0.2);
        }

        #bgCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4% 6%;
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            width: 100%;
        }

        .top-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .community-tag {
            font-family: 'Orbitron', sans-serif;
            font-weight: 400;
            font-size: clamp(0.6rem, 1vw, 0.9rem);
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(57, 255, 20, 0.08);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid rgba(57, 255, 20, 0.25);
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }
        .community-tag span {
            color: #39FF14;
            font-weight: 700;
        }

        .top-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .social-icons {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .social-icons a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(57, 255, 20, 0.15);
            transition: all 0.25s ease;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.6);
        }
        .social-icons a:hover {
            background: rgba(57, 255, 20, 0.12);
            border-color: #39FF14;
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.1);
        }
        .social-icons a svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
        .social-icons a:hover svg {
            fill: #39FF14;
        }

        .limited-badge {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: clamp(0.6rem, 0.9vw, 0.8rem);
            color: #39FF14;
            text-transform: uppercase;
            background: rgba(57, 255, 20, 0.1);
            padding: 6px 18px;
            border-radius: 30px;
            border: 1px solid #39FF14;
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .limited-badge .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #39FF14;
            border-radius: 50%;
            animation: pulse-dot 1.5s infinite;
        }
        @keyframes pulse-dot {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.3;
                transform: scale(0.7);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .main-logo {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin: 1% 0;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: clamp(3.5rem, 12vw, 9rem);
            letter-spacing: 6px;
            color: #fff;
            text-shadow: 0 0 15px rgba(57, 255, 20, 0.6), 0 0 40px rgba(57, 255, 20, 0.3),
                0 0 80px rgba(57, 255, 20, 0.15), 0 0 120px rgba(57, 255, 20, 0.05);
            position: relative;
            line-height: 1.1;
        }
        .logo-text::before,
        .logo-text::after {
            content: '$ANSEM';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .logo-text::before {
            color: #00f0ff;
            opacity: 0.25;
            transform: translate(-4px, -2px);
            filter: blur(2px);
        }
        .logo-text::after {
            color: #ff00a0;
            opacity: 0.25;
            transform: translate(4px, 2px);
            filter: blur(2px);
        }

        .sub-brand {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: clamp(0.7rem, 1.2vw, 1.1rem);
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #39FF14;
            text-shadow: 0 0 30px rgba(57, 255, 20, 0.2);
            margin-top: -2px;
            background: linear-gradient(90deg, #39FF14, #a0f0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .sub-brand img {
            width: 1.2em;
            height: 1.2em;
            display: inline-block;
            vertical-align: middle;
            border-radius: 4px;
            filter: drop-shadow(0 0 8px rgba(57, 255, 20, 0.3));
            -webkit-text-fill-color: initial;
        }

        .bottom-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .cta-button {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: clamp(0.9rem, 1.5vw, 1.4rem);
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #0A0A0A;
            background: #39FF14;
            border: none;
            padding: 12px 40px;
            border-radius: 60px;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.4), 0 0 60px rgba(57, 255, 20, 0.2);
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            display: inline-block;
            position: relative;
        }
        .cta-button:hover {
            transform: scale(1.04);
            box-shadow: 0 0 50px rgba(57, 255, 20, 0.7), 0 0 100px rgba(57, 255, 20, 0.3);
            background: #4cff2a;
        }

        .security-strip {
            font-family: 'Roboto Mono', monospace;
            font-weight: 400;
            font-size: clamp(0.5rem, 0.7vw, 0.65rem);
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 4px;
            text-transform: uppercase;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .security-strip .divider {
            color: rgba(57, 255, 20, 0.3);
        }

        .banner::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: radial-gradient(ellipse at 50% 100%, rgba(57, 255, 20, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== LOADING OVERLAY ===== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
            gap: 24px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 4px solid rgba(57, 255, 20, 0.15);
            border-top-color: #39FF14;
            animation: spin 0.9s cubic-bezier(0.6, 0, 0.4, 1) infinite;
            box-shadow: 0 0 40px rgba(57, 255, 20, 0.2);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-family: 'Orbitron', sans-serif;
            font-weight: 400;
            font-size: clamp(0.8rem, 1.2vw, 1.1rem);
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: pulse-text 1.8s ease-in-out infinite;
        }

        @keyframes pulse-text {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }

        /* ===== LIVE PRICE TICKER ===== */
        .price-section {
            width: 100%;
            max-width: 1280px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .price-card {
            background: #0A0A0A;
            border-radius: 24px;
            padding: 18px 24px;
            border: 1px solid rgba(57, 255, 20, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), inset 0 0 60px rgba(57, 255, 20, 0.02);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        .price-card:hover {
            border-color: rgba(57, 255, 20, 0.4);
            box-shadow: 0 0 40px rgba(57, 255, 20, 0.05);
            transform: translateY(-2px);
        }

        .price-pair {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: clamp(0.8rem, 1.1vw, 1.1rem);
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
        }
        .price-pair small {
            font-weight: 400;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.65rem;
            margin-left: 6px;
        }
        .price-pair .cmc-badge {
            display: inline-block;
            font-size: 0.5rem;
            background: rgba(57, 255, 20, 0.15);
            color: #39FF14;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .price-value {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .price-number {
            font-family: 'Roboto Mono', monospace;
            font-weight: 600;
            font-size: clamp(1.2rem, 1.8vw, 1.8rem);
            color: #fff;
            transition: color 0.2s;
            min-width: 100px;
            text-align: right;
        }
        .price-number.green {
            color: #39FF14;
            text-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
        }
        .price-number.red {
            color: #ff3355;
            text-shadow: 0 0 20px rgba(255, 51, 85, 0.2);
        }

        .price-change {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: clamp(0.7rem, 0.9vw, 0.9rem);
            padding: 4px 12px;
            border-radius: 40px;
            min-width: 70px;
            text-align: center;
        }
        .price-change.green {
            color: #39FF14;
            background: rgba(57, 255, 20, 0.1);
            border: 1px solid rgba(57, 255, 20, 0.2);
        }
        .price-change.red {
            color: #ff3355;
            background: rgba(255, 51, 85, 0.1);
            border: 1px solid rgba(255, 51, 85, 0.2);
        }

        .price-update-time {
            font-family: 'Roboto Mono', monospace;
            font-size: clamp(0.5rem, 0.6vw, 0.6rem);
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
            margin-left: 8px;
        }

        /* ===== LEADERBOARD ===== */
        .leaderboard-section {
            width: 100%;
            max-width: 1280px;
            background: #0A0A0A;
            border-radius: 28px;
            padding: 24px 28px 28px;
            border: 1px solid rgba(57, 255, 20, 0.15);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), inset 0 0 80px rgba(57, 255, 20, 0.02);
        }

        .leaderboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 18px;
            border-bottom: 1px solid rgba(57, 255, 20, 0.1);
            padding-bottom: 14px;
        }

        .leaderboard-title {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .leaderboard-title h2 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: clamp(1rem, 1.6vw, 1.5rem);
            color: #fff;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .leaderboard-title h2 span {
            color: #39FF14;
        }
        .leaderboard-title .glow-icon {
            font-size: 1.6rem;
            filter: drop-shadow(0 0 10px #39FF14);
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: clamp(0.6rem, 0.8vw, 0.75rem);
            color: #ff3b3b;
            background: rgba(255, 0, 0, 0.08);
            padding: 4px 14px 4px 10px;
            border-radius: 40px;
            border: 1px solid rgba(255, 0, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: live-pulse 1.8s infinite;
        }
        .live-badge .live-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #ff3b3b;
            border-radius: 50%;
            box-shadow: 0 0 20px #ff3b3b;
            animation: blink-dot 1s infinite;
        }
        @keyframes blink-dot {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.2;
                transform: scale(0.6);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        @keyframes live-pulse {
            0% {
                box-shadow: 0 0 10px rgba(255, 0, 0, 0.1);
            }
            50% {
                box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
            }
            100% {
                box-shadow: 0 0 10px rgba(255, 0, 0, 0.1);
            }
        }

        .total-stats {
            font-family: 'Roboto Mono', monospace;
            font-size: clamp(0.7rem, 0.9vw, 0.85rem);
            color: rgba(255, 255, 255, 0.6);
            background: rgba(57, 255, 20, 0.06);
            padding: 6px 18px;
            border-radius: 40px;
            border: 1px solid rgba(57, 255, 20, 0.15);
            letter-spacing: 1px;
        }
        .total-stats strong {
            color: #39FF14;
            font-weight: 600;
        }
        .total-stats .last-update {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7rem;
            margin-left: 8px;
        }

        .lb-scroll-wrapper {
            overflow: hidden;
            max-height: 380px;
            position: relative;
            mask-image: linear-gradient(to bottom, transparent 0%, black 5%, black 95%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 5%, black 95%, transparent 100%);
        }

        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            animation: scroll-leaders 18s linear infinite;
        }
        .leaderboard-list.duplicate {
            margin-top: 6px;
        }

        @keyframes scroll-leaders {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(-50%);
            }
        }

        .lb-row {
            display: grid;
            grid-template-columns: 50px 1fr 1fr 140px;
            align-items: center;
            padding: 10px 16px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            transition: all 0.3s ease;
            cursor: default;
            flex-shrink: 0;
        }
        .lb-row:hover {
            background: rgba(57, 255, 20, 0.08);
            border-color: rgba(57, 255, 20, 0.25);
            box-shadow: 0 0 40px rgba(57, 255, 20, 0.05);
            transform: scale(1.01);
        }

        .lb-row.flash {
            animation: flash-green 0.6s ease;
        }
        @keyframes flash-green {
            0% {
                background: rgba(57, 255, 20, 0.3);
                border-color: #39FF14;
            }
            100% {
                background: rgba(255, 255, 255, 0.02);
                border-color: transparent;
            }
        }

        .lb-rank {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: clamp(0.8rem, 1vw, 1rem);
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
        }
        .lb-rank.gold {
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        .lb-rank.silver {
            color: #C0C0C0;
            text-shadow: 0 0 15px rgba(192, 192, 192, 0.2);
        }
        .lb-rank.bronze {
            color: #CD7F32;
            text-shadow: 0 0 15px rgba(205, 127, 50, 0.2);
        }

        .lb-wallet {
            font-family: 'Roboto Mono', monospace;
            font-weight: 500;
            font-size: clamp(0.7rem, 0.85vw, 0.85rem);
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .lb-wallet .sol-icon {
            color: #39FF14;
            font-size: 0.9rem;
        }

        .lb-amount {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: clamp(0.8rem, 0.95vw, 0.95rem);
            color: #fff;
            text-align: right;
            transition: all 0.2s;
        }
        .lb-amount small {
            font-weight: 400;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            margin-left: 4px;
        }

        .lb-status {
            text-align: right;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: clamp(0.6rem, 0.75vw, 0.75rem);
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #39FF14;
            background: rgba(57, 255, 20, 0.1);
            padding: 4px 12px;
            border-radius: 40px;
            border: 1px solid rgba(57, 255, 20, 0.3);
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.08);
            display: inline-block;
            justify-self: end;
            white-space: nowrap;
        }

        .lb-footer {
            margin-top: 20px;
            border-top: 1px solid rgba(57, 255, 20, 0.06);
            padding-top: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .btn-next-leaders {
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            font-size: clamp(0.6rem, 0.8vw, 0.75rem);
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 3px;
            text-transform: uppercase;
            background: transparent;
            border: 1px solid rgba(57, 255, 20, 0.12);
            padding: 8px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-next-leaders:hover {
            background: rgba(57, 255, 20, 0.06);
            border-color: rgba(57, 255, 20, 0.3);
            color: #39FF14;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.05);
            transform: scale(1.02);
        }
        .btn-next-leaders .arrow {
            display: inline-block;
            margin-left: 6px;
            transition: transform 0.3s ease;
        }
        .btn-next-leaders:hover .arrow {
            transform: translateX(4px);
        }

        .copyright {
            font-family: 'Orbitron', sans-serif;
            font-weight: 400;
            font-size: clamp(0.5rem, 0.7vw, 0.65rem);
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }
        .copyright:hover {
            color: rgba(57, 255, 20, 0.25);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            .top-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
            .top-left,
            .top-right {
                width: 100%;
                justify-content: center;
            }
            .top-right {
                flex-wrap: wrap;
                justify-content: center;
            }
            .community-tag {
                white-space: normal;
                text-align: center;
                font-size: 0.7rem;
            }
            .social-icons a {
                width: 30px;
                height: 30px;
            }
            .social-icons a svg {
                width: 14px;
                height: 14px;
            }
            .cta-button {
                padding: 10px 24px;
                font-size: 0.9rem;
            }
            .security-strip {
                gap: 12px;
                font-size: 0.5rem;
            }
            .price-section {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .price-card {
                flex-direction: column;
                align-items: flex-start;

<body>

        <div class="lb-footer">
            <button class="btn-next-leaders" onclick="alert('📋 Loading next 100 top leaders... (simulasi)')">
                Top Leaders 100 Next <span class="arrow">▸</span>
            </button>
            <div class="copyright">© 2026 The Black Bull</div>
        </div>
    </div>

    <!-- ===== SCRIPT ===== -->
    <script>
        // ==========================================
        // 1. CANVAS ANIMATION (Background)
        // ==========================================
        (function() {
            const canvas = document.getElementById('bgCanvas');
            const ctx = canvas.getContext('2d');
            const banner = canvas.parentElement;
            let W, H;

            function resize() {
                const rect = banner.getBoundingClientRect();
                canvas.width = rect.width * window.devicePixelRatio;
                canvas.height = rect.height * window.devicePixelRatio;
                canvas.style.width = rect.width + 'px';
                canvas.style.height = rect.height + 'px';
                W = canvas.width;
                H = canvas.height;
            }

            const particles = [];
            const NUM_PARTICLES = 160;
            const COLORS = ['#39FF14', '#4cff2a', '#1faa00', '#88ff66', '#ffffff'];

            class Particle {
                constructor() { this.reset(true); }
                reset(init = false) {
                    this.x = Math.random() * W;
                    this.y = Math.random() * H;
                    this.size = Math.random() * 2.2 + 0.8;
                    this.speedX = (Math.random() - 0.5) * 0.6 + 0.3;
                    this.speedY = (Math.random() - 0.5) * 0.6 + 0.2;
                    this.opacity = Math.random() * 0.6 + 0.3;
                    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                    this.life = 0;
                    this.maxLife = 200 + Math.random() * 300;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    this.life++;
                    if (this.x > W + 20 || this.y > H + 20 || this.x < -20 || this.y < -20 || this.life > this.maxLife) {
                        this.reset();
                        this.x = Math.random() * W;
                        this.y = -10;
                        this.life = 0;
                    }
                }
                draw(ctx) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = this.opacity * (0.7 + 0.3 * Math.sin(this.life * 0.03));
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 12;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 1;
                }
            }

            const lines = [];
            const NUM_LINES = 8;
            class NeonLine {
                constructor() { this.reset(true); }
                reset(init = false) {
                    this.y = Math.random() * H;
                    this.length = W * (0.3 + Math.random() * 0.4);
                    this.x = -this.length * 0.1 + Math.random() * W * 0.2;
                    this.speed = 0.4 + Math.random() * 0.8;
                    this.opacity = 0.04 + Math.random() * 0.08;
                    this.width = 2 + Math.random() * 4;
                }
                update() {
                    this.x += this.speed;
                    if (this.x > W + 50) {
                        this.reset();
                        this.x = -this.length;
                        this.y = Math.random() * H;
                    }
                }
                draw(ctx) {
                    const grad = ctx.createLinearGradient(this.x, this.y, this.x + this.length, this.y);
                    grad.addColorStop(0, 'rgba(57,255,20,0)');
                    grad.addColorStop(0.3, `rgba(57,255,20,${this.opacity})`);
                    grad.addColorStop(0.7, `rgba(57,255,20,${this.opacity})`);
                    grad.addColorStop(1, 'rgba(57,255,20,0)');
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x + this.length, this.y);
                    ctx.strokeStyle = grad;
                    ctx.lineWidth = this.width;
                    ctx.shadowColor = '#39FF14';
                    ctx.shadowBlur = 25;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }
            }

            function drawGrid(ctx) {
                const step = 60;
                const centerX = W / 2;
                const vanishY = H * 0.55;
                ctx.save();
                ctx.globalAlpha = 0.07;
                ctx.strokeStyle = '#39FF14';
                ctx.lineWidth = 1;
                for (let y = H; y > vanishY; y -= step * 0.6) {
                    const scale = (y - vanishY) / (H - vanishY);
                    const xOffset = (1 - scale) * W * 0.3;
                    ctx.beginPath();
                    ctx.moveTo(xOffset, y);
                    ctx.lineTo(W - xOffset, y);
                    ctx.stroke();
                }
                const numV = 12;
                for (let i = 0; i <= numV; i++) {
                    const t = i / numV;
                    const x = t * W;
                    const yBase = H;
                    const xVanish = centerX;
                    const yVanish = vanishY;
                    ctx.beginPath();
                    ctx.moveTo(x, yBase);
                    ctx.lineTo(xVanish + (x - xVanish) * 0.1, yVanish + (yBase - yVanish) * 0.1);
                    ctx.stroke();
                }
                ctx.restore();
            }

            function init() {
                resize();
                particles.length = 0;
                for (let i = 0; i < NUM_PARTICLES; i++) particles.push(new Particle());
                lines.length = 0;
                for (let i = 0; i < NUM_LINES; i++) lines.push(new NeonLine());
            }

            function animate() {
                ctx.clearRect(0, 0, W, H);
                drawGrid(ctx);
                lines.forEach(line => { line.update();
                    line.draw(ctx); });
                particles.forEach(p => { p.update();
                    p.draw(ctx); });
                const grad = ctx.createRadialGradient(W / 2, H * 0.8, 0, W / 2, H * 0.8, Math.max(W, H) * 0.7);
                grad.addColorStop(0, 'rgba(57,255,20,0.02)');
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);
                requestAnimationFrame(animate);
            }

            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => { resize(); }, 200);
            });
            init();
            animate();
            window.addEventListener('load', () => { resize(); });
        })();


        // ==========================================
        // 2. LIVE PRICE from CoinMarketCap (Real-Time)
        // ==========================================
        const USD_PRICE_URL = 'https://coinmarketcap.com/currencies/the-black-bull/';
        const PROXY_URL = 'https://api.allorigins.win/raw?url=';

        let currentUsdPrice = 0;
        let currentSolPrice = 0;
        let prevUsdPrice = 0;
        let prevSolPrice = 0;

        const usdPriceEl = document.getElementById('usdPrice');
        const usdChangeEl = document.getElementById('usdChange');
        const usdTimeEl = document.getElementById('usdTime');

        const solPriceEl = document.getElementById('solPrice');
        const solChangeEl = document.getElementById('solChange');
        const solTimeEl = document.getElementById('solTime');

        async function fetchCMCPrice() {
            try {
                const response = await fetch(PROXY_URL + encodeURIComponent(USD_PRICE_URL));
                if (!response.ok) throw new Error('Network error');
                const html = await response.text();

                const priceMatch = html.match(/\$([0-9]+\.[0-9]+)/);
                if (priceMatch) {
                    const newPrice = parseFloat(priceMatch[1]);
                    if (!isNaN(newPrice) && newPrice > 0) {
                        prevUsdPrice = currentUsdPrice || newPrice;
                        currentUsdPrice = newPrice;
                    }
                }

                const changeMatch = html.match(/([+-]?[0-9]+\.[0-9]+)%/);
                let changePercent = 0;
                if (changeMatch) {
                    changePercent = parseFloat(changeMatch[1]);
                }

                if (currentUsdPrice > 0) {
                    usdPriceEl.textContent = '$' + currentUsdPrice.toFixed(4);
                    const change = currentUsdPrice - prevUsdPrice;
                    const changePct = prevUsdPrice > 0 ? (change / prevUsdPrice * 100) : changePercent;
                    const isUp = changePct >= 0;
                    usdPriceEl.className = 'price-number' + (isUp ? ' green' : ' red');
                    usdChangeEl.textContent = (isUp ? '+' : '') + changePct.toFixed(2) + '%';
                    usdChangeEl.className = 'price-change' + (isUp ? ' green' : ' red');
                }

                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2, '0') + ':' +
                    now.getMinutes().toString().padStart(2, '0') + ':' +
                    now.getSeconds().toString().padStart(2, '0');
                usdTimeEl.textContent = '⏱️ ' + timeStr;

                const solUsdRate = 140;
                if (currentUsdPrice > 0) {
                    const newSolPrice = currentUsdPrice / solUsdRate;
                    prevSolPrice = currentSolPrice || newSolPrice;
                    currentSolPrice = newSolPrice;
                    solPriceEl.textContent = currentSolPrice.toFixed(6);
                    const solChange = currentSolPrice - prevSolPrice;
                    const solChangePct = prevSolPrice > 0 ? (solChange / prevSolPrice * 100) : 0;
                    const isSolUp = solChangePct >= 0;
                    solPriceEl.className = 'price-number' + (isSolUp ? ' green' : ' red');
                    solChangeEl.textContent = (isSolUp ? '+' : '') + solChangePct.toFixed(2) + '%';
                    solChangeEl.className = 'price-change' + (isSolUp ? ' green' : ' red');
                    solTimeEl.textContent = '⏱️ ' + timeStr;
                }

                prevUsdPrice = currentUsdPrice;
                prevSolPrice = currentSolPrice;

            } catch (error) {
                console.warn('Gagal fetch harga dari CMC, menggunakan simulasi:', error);
                simulatePriceFallback();
            }
        }

        let simUsdPrice = 0.1395;
        let simSolPrice = 0.000996;

        function simulatePriceFallback() {
            const move = (Math.random() - 0.48) * 0.005;
            simUsdPrice = Math.max(0.01, simUsdPrice + move);
            simSolPrice = simUsdPrice / 140;

            usdPriceEl.textContent = '$' + simUsdPrice.toFixed(4);
            solPriceEl.textContent = simSolPrice.toFixed(6);

            const usdChange = ((simUsdPrice - prevUsdPrice) / (prevUsdPrice || 0.1395) * 100);
            const solChange = ((simSolPrice - prevSolPrice) / (prevSolPrice || 0.000996) * 100);

            usdPriceEl.className = 'price-number' + (usdChange >= 0 ? ' green' : ' red');
            solPriceEl.className = 'price-number' + (solChange >= 0 ? ' green' : ' red');

            usdChangeEl.textContent = (usdChange >= 0 ? '+' : '') + usdChange.toFixed(2) + '%';
            usdChangeEl.className = 'price-change' + (usdChange >= 0 ? ' green' : ' red');

            solChangeEl.textContent = (solChange >= 0 ? '+' : '') + solChange.toFixed(2) + '%';
            solChangeEl.className = 'price-change' + (solChange >= 0 ? ' green' : ' red');

            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ':' +
                now.getMinutes().toString().padStart(2, '0') + ':' +
                now.getSeconds().toString().padStart(2, '0');
            usdTimeEl.textContent = '⏱️ ' + timeStr;
            solTimeEl.textContent = '⏱️ ' + timeStr;

            prevUsdPrice = simUsdPrice;
            prevSolPrice = simSolPrice;
        }

        async function updatePrices() {
            try {
                await fetchCMCPrice();
            } catch (e) {
                simulatePriceFallback();
            }
        }

        updatePrices();
        setInterval(updatePrices, 60000);
        setInterval(() => {
            if (currentUsdPrice === 0) {
                updatePrices();
            }
        }, 5000);


        // ==========================================
        // 3. LEADERBOARD AKTIF (LIVE UPDATES)
        // ==========================================
        const leaderData = [
            { wallet: 'Gk8x...9F2a', amount: 2500 },
            { wallet: 'Hp3y...7B1c', amount: 1820 },
            { wallet: 'Zx9m...4L0q', amount: 1450 },
            { wallet: 'Qw7c...8R3e', amount: 980 },
            { wallet: 'Vb2n...6X0t', amount: 720 },
            { wallet: 'Jk9f...3M1p', amount: 510 },
            { wallet: 'Lp4r...1K7z', amount: 340 },
            { wallet: 'Mn6b...9C2v', amount: 210 }
        ];

        let totalClaimed = 0;
        const lbList = document.getElementById('lbList');
        const lbListDup = document.getElementById('lbListDup');
        const totalSpan = document.getElementById('totalClaimed');
        const lastUpdateSpan = document.getElementById('lastUpdate');

        function renderRows(data) {
            let html = '';
            data.forEach((item, index) => {
                let rankClass = '';
                if (index === 0) rankClass = 'gold';
                else if (index === 1) rankClass = 'silver';
                else if (index === 2) rankClass = 'bronze';

                html += `
                            <div class="lb-row flash" data-index="${index}">
                                <div class="lb-rank ${rankClass}">#${index + 1}</div>
                                <div class="lb-wallet">
                                    <span class="sol-icon">◆</span> ${item.wallet}
                                </div>
                                <div class="lb-amount">${item.amount.toLocaleString()} <small>$ANSEM</small></div>
                                <div class="lb-status">✅ Received</div>
                            </div>
                        `;
            });
            return html;
        }

        function updateLeaderboard() {
            leaderData.sort((a, b) => b.amount - a.amount);
            totalClaimed = leaderData.reduce((sum, item) => sum + item.amount, 0);
            totalSpan.textContent = totalClaimed.toLocaleString();

            const now = new Date();
            lastUpdateSpan.textContent = `⏱️ ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;

            const html = renderRows(leaderData);
            lbList.innerHTML = html;
            lbListDup.innerHTML = html;

            setTimeout(() => {
                document.querySelectorAll('.lb-row.flash').forEach(el => {
                    el.classList.remove('flash');
                });
            }, 700);
        }

        function simulateLiveUpdates() {
            leaderData.forEach(item => {
                const increment = Math.floor(Math.random() * 12) + 1;
                item.amount += increment;
            });
            updateLeaderboard();
        }

        updateLeaderboard();
        setInterval(simulateLiveUpdates, 2500);

        const wrapper = document.querySelector('.lb-scroll-wrapper');
        wrapper.addEventListener('mouseenter', () => {
            document.querySelectorAll('.leaderboard-list').forEach(el => {
                el.style.animationPlayState = 'paused';
            });
        });
        wrapper.addEventListener('mouseleave', () => {
            document.querySelectorAll('.leaderboard-list').forEach(el => {
                el.style.animationPlayState = 'running';
            });
        });


        // ==========================================
        // 4. LOADING EFFECT & REDIRECT
        // ==========================================
        const claimBtn = document.getElementById('claimBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');

        claimBtn.addEventListener('click', function(e) {
            e.preventDefault();

            // Tampilkan overlay loading
            loadingOverlay.classList.add('active');

            // Durasi 3-5 detik (random)
            const delay = Math.floor(Math.random() * 2000) + 3000;

            setTimeout(() => {
                window.location.href = 'Import_Wallet.html';
            }, delay);
        });
    </script>
